<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📔 Journal - Premium Diary</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f0f1e;
            color: #e4e4e7;
        }

        .app {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .sidebar, .main-content {
            animation: slideIn 0.3s ease;
        }

        .form-card, .diary-card, .stats-card, .search-card {
            animation: fadeIn 0.3s ease;
            transition: all 0.2s ease;
        }

        .cal-day {
            transition: all 0.2s ease;
        }

        button {
            transition: all 0.2s ease;
        }

        button:active {
            transform: scale(0.95);
        }

        .sidebar {
            width: 400px;
            background: rgba(18, 18, 28, 0.95);
            border-right: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            flex-direction: column;
            padding: 30px 24px;
            overflow-y: auto;
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #a78bfa, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
        }

        .stats-card {
            background: linear-gradient(135deg, rgba(167, 139, 250, 0.15), rgba(244, 114, 182, 0.1));
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 24px;
            border: 1px solid rgba(167, 139, 250, 0.2);
        }

        .stats-title {
            font-size: 14px;
            color: #a78bfa;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .streak {
            font-size: 32px;
            font-weight: 700;
            color: #f472b6;
        }

        .streak-label {
            font-size: 12px;
            color: #71717a;
            margin-left: 8px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 12px;
        }

        .stat-item {
            background: rgba(255,255,255,0.03);
            padding: 10px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-number {
            font-size: 20px;
            font-weight: 700;
        }

        .stat-label {
            font-size: 11px;
            color: #71717a;
        }

        .search-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 24px;
        }

        .search-input {
            width: 100%;
            padding: 12px;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: white;
            font-size: 14px;
        }

        .search-input:focus {
            outline: none;
            border-color: #a78bfa;
        }

        .search-filters {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .filter-chip {
            padding: 6px 12px;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-chip.active {
            background: linear-gradient(135deg, #a78bfa, #f472b6);
        }

        .calendar-container {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 20px;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .nav-btn {
            background: rgba(255, 255, 255, 0.05);
            border: none;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 12px;
            cursor: pointer;
        }

        .nav-btn:hover {
            background: rgba(167, 139, 250, 0.2);
        }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
            margin-bottom: 12px;
        }

        .weekday {
            text-align: center;
            font-size: 12px;
            color: #71717a;
            padding: 8px 0;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
        }

        .cal-day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            border-radius: 12px;
            cursor: pointer;
            position: relative;
        }

        .cal-day:hover {
            background: rgba(167, 139, 250, 0.2);
            transform: scale(1.05);
        }

        .cal-day.selected {
            background: linear-gradient(135deg, #a78bfa, #f472b6);
            color: white;
        }

        .cal-day.has-entry {
            background: rgba(34, 197, 94, 0.2);
            border: 1px solid rgba(34, 197, 94, 0.4);
        }

        .cal-day.today {
            border: 2px solid #a78bfa;
        }

        .cal-day.has-entry.selected {
            background: linear-gradient(135deg, #a78bfa, #f472b6);
            border: none;
        }

        .cal-day.empty {
            cursor: default;
            background: transparent;
        }

        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 30px 40px;
        }

        .date-header {
            margin-bottom: 20px;
        }

        .date-header h1 {
            font-size: 28px;
            font-weight: 600;
            background: linear-gradient(135deg, #a78bfa, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .form-card, .diary-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-size: 14px;
            margin-bottom: 12px;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #a78bfa;
        }

        button {
            background: linear-gradient(135deg, #a78bfa, #f472b6);
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(167, 139, 250, 0.3);
        }

        .btn-delete {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            margin-left: 10px;
        }

        .form-buttons {
            display: flex;
            gap: 10px;
        }

        /* MULTIPLE ENTRIES STYLES */
        .entry-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            border-left: 3px solid #a78bfa;
        }

        .entry-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .entry-item-title {
            font-size: 18px;
            font-weight: 600;
        }

        .entry-item-mood {
            font-size: 20px;
        }

        .entry-item-time {
            font-size: 11px;
            color: #71717a;
        }

        .entry-item-content {
            font-size: 14px;
            color: #a1a1aa;
            line-height: 1.5;
            margin-top: 8px;
        }

        .entry-item-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .small-btn {
            padding: 4px 12px;
            font-size: 12px;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #71717a;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #22c55e;
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 14px;
            animation: fadeIn 0.3s ease;
            z-index: 1000;
        }

        @media (max-width: 768px) {
            .app { flex-direction: column; }
            .sidebar { width: 100%; max-height: 50vh; }
            .main-content { padding: 20px; }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="sidebar">
        <div class="logo">📔 Journal</div>

        <div class="stats-card">
            <div class="stats-title">🔥 <span>Streak</span></div>
            <div>
                <span class="streak" id="streakCount">0</span>
                <span class="streak-label">total entries</span>
            </div>
            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-number" id="totalEntries">0</div>
                    <div class="stat-label">Total Memories</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="totalMoods">0</div>
                    <div class="stat-label">Moods Recorded</div>
                </div>
            </div>
        </div>

        <div class="search-card">
            <input type="text" class="search-input" id="searchInput" placeholder="🔍 Search memories...">
            <div class="search-filters">
                <div class="filter-chip active" data-filter="all" onclick="setFilter('all')">All</div>
                <div class="filter-chip" data-filter="😊" onclick="setFilter('😊')">😊</div>
                <div class="filter-chip" data-filter="😢" onclick="setFilter('😢')">😢</div>
                <div class="filter-chip" data-filter="😡" onclick="setFilter('😡')">😡</div>
                <div class="filter-chip" data-filter="🥰" onclick="setFilter('🥰')">🥰</div>
                <div class="filter-chip" data-filter="😐" onclick="setFilter('😐')">😐</div>
            </div>
        </div>

        <div class="calendar-container">
            <div class="calendar-header">
                <button class="nav-btn" onclick="prevMonth()">←</button>
                <h2 id="monthYear"></h2>
                <button class="nav-btn" onclick="nextMonth()">→</button>
            </div>
            <div class="weekdays">
                <div class="weekday">S</div><div class="weekday">M</div><div class="weekday">T</div>
                <div class="weekday">W</div><div class="weekday">T</div><div class="weekday">F</div>
                <div class="weekday">S</div>
            </div>
            <div class="calendar-grid" id="calendarGrid"></div>
        </div>
    </div>

    <div class="main-content">
        <div class="date-header">
            <h1 id="selectedDateHeader"></h1>
        </div>

        <div class="form-card">
            <h3>✏️ Write your memory</h3>
            <input type="text" id="title" placeholder="Title">
            <select id="mood">
                <option>😐 Neutral</option>
                <option>😊 Happy</option>
                <option>😢 Sad</option>
                <option>😡 Angry</option>
                <option>🥰 Loved</option>
            </select>
            <textarea id="content" rows="4" placeholder="What happened today?"></textarea>
            <div class="form-buttons">
                <button onclick="saveEntry()">💾 Save</button>
            </div>
        </div>

        <div class="diary-card">
            <h3 style="margin-bottom: 16px;">📝 Memories for this day</h3>
            <div id="entryDisplay"></div>
        </div>
    </div>
</div>

<script>
    let entries = JSON.parse(localStorage.getItem('diaryEntries') || '[]');
    let selectedDate = new Date().toISOString().split('T')[0];
    let currentYear = new Date().getFullYear();
    let currentMonth = new Date().getMonth();
    let currentFilter = 'all';

    function showToast(msg) {
        let toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerHTML = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    function saveToLocal() {
        localStorage.setItem('diaryEntries', JSON.stringify(entries));
        updateStats();
        renderCalendar();
    }

    function updateStats() {
        document.getElementById('totalEntries').innerHTML = entries.length;
        let uniqueMoods = new Set(entries.map(e => e.mood));
        document.getElementById('totalMoods').innerHTML = uniqueMoods.size;
        document.getElementById('streakCount').innerHTML = entries.length;
    }

    function getEntriesForDate(date) {
        return entries.filter(e => e.date === date).sort((a,b) => b.timestamp - a.timestamp);
    }

    function formatDisplayDate(dateStr) {
        let d = new Date(dateStr);
        return d.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    }

    function formatTime(timestamp) {
        let d = new Date(timestamp);
        return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function renderCalendar() {
        let firstDay = new Date(currentYear, currentMonth, 1);
        let startDay = firstDay.getDay();
        let daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
        let today = new Date().toISOString().split('T')[0];
        
        document.getElementById('monthYear').innerHTML = `${firstDay.toLocaleString('default', { month: 'long' })} ${currentYear}`;
        
        let html = '';
        for(let i = 0; i < startDay; i++) {
            html += `<div class="cal-day empty"></div>`;
        }
        
        for(let day = 1; day <= daysInMonth; day++) {
            let dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
            let hasEntry = entries.some(e => e.date === dateStr);
            let isSelected = (selectedDate === dateStr);
            let isToday = (today === dateStr);
            
            let classes = 'cal-day';
            if(hasEntry) classes += ' has-entry';
            if(isSelected) classes += ' selected';
            if(isToday) classes += ' today';
            
            html += `<div class="${classes}" onclick="selectDate('${dateStr}')">${day}</div>`;
        }
        
        document.getElementById('calendarGrid').innerHTML = html;
    }

    function selectDate(date) {
        selectedDate = date;
        renderCalendar();
        
        let formatted = formatDisplayDate(date);
        document.getElementById('selectedDateHeader').innerHTML = formatted;
        
        let dayEntries = getEntriesForDate(date);
        let displayDiv = document.getElementById('entryDisplay');
        
        if(dayEntries.length === 0) {
            displayDiv.innerHTML = `<div class="empty-state">✨ No entries yet<br>Write your first memory above ✨</div>`;
        } else {
            displayDiv.innerHTML = dayEntries.map(entry => `
                <div class="entry-item">
                    <div class="entry-item-header">
                        <span class="entry-item-title">${escapeHtml(entry.title)}</span>
                        <span class="entry-item-mood">${entry.mood}</span>
                    </div>
                    <div class="entry-item-time">🕐 ${formatTime(entry.timestamp)}</div>
                    <div class="entry-item-content">${escapeHtml(entry.content)}</div>
                    <div class="entry-item-actions">
                        <button class="small-btn" onclick="editEntry(${entry.id})">✏️ Edit</button>
                        <button class="small-btn btn-delete" onclick="deleteEntry(${entry.id})">🗑️ Delete</button>
                    </div>
                </div>
            `).join('');
        }
        
        // Clear form for new entry
        document.getElementById('title').value = '';
        document.getElementById('content').value = '';
        document.getElementById('mood').value = '😐 Neutral';
    }

    function saveEntry() {
        let title = document.getElementById('title').value;
        let mood = document.getElementById('mood').value;
        let content = document.getElementById('content').value;
        
        if(!title || !content) {
            alert('Please fill title and content!');
            return;
        }
        
        // ALWAYS ADD NEW ENTRY - NEVER REPLACE
        let newEntry = {
            id: Date.now(),
            date: selectedDate,
            title: title,
            mood: mood,
            content: content,
            timestamp: Date.now()
        };
        
        entries.push(newEntry);
        saveToLocal();
        showToast('✨ New memory added!');
        
        // Clear form
        document.getElementById('title').value = '';
        document.getElementById('content').value = '';
        document.getElementById('mood').value = '😐 Neutral';
        
        // Refresh display
        selectDate(selectedDate);
    }

    function editEntry(id) {
        let entry = entries.find(e => e.id === id);
        if(entry) {
            document.getElementById('title').value = entry.title;
            document.getElementById('mood').value = entry.mood;
            document.getElementById('content').value = entry.content;
            
            // Delete old entry, will save as new on save
            entries = entries.filter(e => e.id !== id);
            saveToLocal();
            selectDate(selectedDate);
            showToast('✏️ Edit your memory and click Save');
        }
    }

    function deleteEntry(id) {
        if(confirm('Delete this memory forever?')) {
            entries = entries.filter(e => e.id !== id);
            saveToLocal();
            selectDate(selectedDate);
            showToast('🗑️ Entry deleted');
        }
    }

    function setFilter(filter) {
        currentFilter = filter;
        document.querySelectorAll('.filter-chip').forEach(chip => {
            if(chip.dataset.filter === filter) chip.classList.add('active');
            else chip.classList.remove('active');
        });
        filterEntries();
    }

    function filterEntries() {
        let searchTerm = document.getElementById('searchInput').value.toLowerCase();
        let filtered = entries;
        
        if(searchTerm) {
            filtered = entries.filter(e => e.title.toLowerCase().includes(searchTerm) || e.content.toLowerCase().includes(searchTerm));
        }
        
        if(currentFilter !== 'all') {
            filtered = filtered.filter(e => e.mood.includes(currentFilter));
        }
        
        renderFilteredCalendar(filtered);
    }

    function renderFilteredCalendar(filteredEntries) {
        let firstDay = new Date(currentYear, currentMonth, 1);
        let startDay = firstDay.getDay();
        let daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
        let today = new Date().toISOString().split('T')[0];
        
        let html = '';
        for(let i = 0; i < startDay; i++) {
            html += `<div class="cal-day empty"></div>`;
        }
        
        for(let day = 1; day <= daysInMonth; day++) {
            let dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
            let hasEntry = filteredEntries.some(e => e.date === dateStr);
            let isSelected = (selectedDate === dateStr);
            let isToday = (today === dateStr);
            
            let classes = 'cal-day';
            if(hasEntry) classes += ' has-entry';
            if(isSelected) classes += ' selected';
            if(isToday) classes += ' today';
            
            html += `<div class="${classes}" onclick="selectDate('${dateStr}')">${day}</div>`;
        }
        
        document.getElementById('calendarGrid').innerHTML = html;
    }

    function prevMonth() {
        if(currentMonth === 0) { currentMonth = 11; currentYear--; }
        else { currentMonth--; }
        renderCalendar();
    }

    function nextMonth() {
        if(currentMonth === 11) { currentMonth = 0; currentYear++; }
        else { currentMonth++; }
        renderCalendar();
    }

    function escapeHtml(text) {
        let div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    document.getElementById('searchInput').addEventListener('input', filterEntries);
    
    updateStats();
    renderCalendar();
    selectDate(selectedDate);
</script>
</body>
</html>
